apiVersion: apps/v1
kind: Deployment
metadata:
  name: beautyiq-backend
  namespace: beautyiq
  labels:
    app: beautyiq-backend
    version: "1.0.0"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: beautyiq-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: beautyiq-backend
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: [beautyiq-backend]
                topologyKey: kubernetes.io/hostname
      containers:
        - name: backend
          image: beautyiq/backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: "production"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: beautyiq-secrets
                  key: database-url
            - name: REDIS_HOST
              value: "redis-service"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: beautyiq-secrets
                  key: openai-api-key
            - name: CLERK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: beautyiq-secrets
                  key: clerk-secret-key
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: beautyiq-secrets
                  key: aws-access-key-id
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: beautyiq-secrets
                  key: aws-secret-access-key
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: beautyiq-web
  namespace: beautyiq
spec:
  replicas: 3
  selector:
    matchLabels:
      app: beautyiq-web
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: beautyiq-web
    spec:
      containers:
        - name: web
          image: beautyiq/web:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: NEXT_PUBLIC_API_URL
              value: "https://api.beautyiq.ai/api"
            - name: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
              valueFrom:
                secretKeyRef:
                  name: beautyiq-secrets
                  key: clerk-publishable-key
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: beautyiq
spec:
  selector:
    app: beautyiq-backend
  ports:
    - protocol: TCP
      port: 3001
      targetPort: 3001
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: web-service
  namespace: beautyiq
spec:
  selector:
    app: beautyiq-web
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: beautyiq-ingress
  namespace: beautyiq
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  tls:
    - hosts:
        - beautyiq.ai
        - api.beautyiq.ai
      secretName: beautyiq-tls
  rules:
    - host: beautyiq.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-service
                port:
                  number: 3000
    - host: api.beautyiq.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 3001
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: beautyiq
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: beautyiq-backend
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: web-hpa
  namespace: beautyiq
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: beautyiq-web
  minReplicas: 3
  maxReplicas: 15
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
